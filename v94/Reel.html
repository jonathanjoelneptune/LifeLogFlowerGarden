
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeLog Photo Reel v2</title>
  <style>
    html, body { height: 100%; margin: 0; background: transparent; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,0.08);
    }
    .img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: none;
      will-change: opacity;
      pointer-events: none;
    }
    .img.show { opacity: 1; }

    .hud {
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 12px;
      backdrop-filter: blur(6px);
      max-width: calc(100% - 20px);
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #fff;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      text-align: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .empty .title { font-size: 14px; font-weight: 700; }
    .empty .sub { margin-top: 6px; opacity: 0.85; font-size: 12px; line-height: 1.35; }
    .empty .err { margin-top: 10px; opacity: 0.75; font-size: 11px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap"></div>

  <script>
    const VERSION = "reel_v2_robust_drive_loading";
    const DEFAULT_EXEC = "https://script.google.com/macros/s/AKfycbyHPnSrEOdYJwoIQpRk4SajFg9cgpSeXsH0ilg9-c2EglqzeSIubVhgy7WogI-Idsu8/exec";

    function qs() {
      const out = {};
      const q = (location.search || "").replace(/^\?/, "");
      if (!q) return out;
      q.split("&").forEach(p => {
        const [k, v] = p.split("=");
        const key = decodeURIComponent(k || "").trim();
        if (!key) return;
        out[key] = decodeURIComponent(v || "");
      });
      return out;
    }

    function clampInt(v, def, min, max) {
      const n = Number(v);
      if (!isFinite(n)) return def;
      return Math.max(min, Math.min(max, Math.round(n)));
    }

    function makeHud(text) {
      const hud = document.createElement("div");
      hud.className = "hud";
      hud.textContent = text;
      return hud;
    }

    function showEmpty(wrap, title, sub, err) {
      const d = document.createElement("div");
      d.className = "empty";
      d.innerHTML =
        '<div>' +
          '<div class="title">' + title + '</div>' +
          '<div class="sub">' + sub + '</div>' +
          (err ? '<div class="err">' + String(err) + '</div>' : '') +
        '</div>';
      wrap.appendChild(d);
    }

    function extractDriveId(url) {
      try {
        const s = String(url || "").trim();
        let m = s.match(/\/file\/d\/([^/]+)/i);
        if (m && m[1]) return m[1];
        m = s.match(/[?&]id=([^&#]+)/i);
        if (m && m[1]) return m[1];
        return "";
      } catch (e) {
        return "";
      }
    }

    function buildCandidateUrls(rawUrl, widthHint) {
      const src = String(rawUrl || "").trim();
      const out = [];
      const push = (u) => {
        if (!u) return;
        if (!out.includes(u)) out.push(u);
      };

      const id = extractDriveId(src);
      const w = Math.max(512, Math.min(4000, Number(widthHint) || 1600));

      if (id) {
        push(`https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=w${w}`);
        push(`https://drive.google.com/uc?export=view&id=${encodeURIComponent(id)}`);
        push(`https://lh3.googleusercontent.com/d/${encodeURIComponent(id)}=w${w}`);
        push(`https://drive.usercontent.google.com/download?id=${encodeURIComponent(id)}&export=view&authuser=0`);
      }

      push(src);
      return out;
    }

    function tryLoadCandidates(candidates, timeoutMs) {
      const list = Array.isArray(candidates) ? candidates.slice() : [];
      const timeout = Math.max(1200, Number(timeoutMs) || 7000);

      return new Promise((resolve, reject) => {
        let idx = 0;
        let settled = false;

        function doneOk(url) {
          if (settled) return;
          settled = true;
          resolve(url);
        }

        function doneFail(err) {
          if (settled) return;
          settled = true;
          reject(err || new Error("image load failed"));
        }

        function tryNext() {
          if (settled) return;
          if (idx >= list.length) {
            doneFail(new Error("all candidate URLs failed"));
            return;
          }

          const url = list[idx++];
          const probe = new Image();
          let timer = null;
          let completed = false;

          function cleanup() {
            if (timer) clearTimeout(timer);
            probe.onload = null;
            probe.onerror = null;
          }

          probe.onload = function() {
            if (completed || settled) return;
            completed = true;
            cleanup();
            doneOk(url);
          };

          probe.onerror = function() {
            if (completed || settled) return;
            completed = true;
            cleanup();
            tryNext();
          };

          timer = setTimeout(function() {
            if (completed || settled) return;
            completed = true;
            cleanup();
            tryNext();
          }, timeout);

          probe.decoding = "async";
          probe.referrerPolicy = "no-referrer";
          probe.src = url;
        }

        tryNext();
      });
    }

    const wrap = document.getElementById("wrap");
    const p = qs();

    const bot = (p.bot || "winston").trim();
    const dateKey = (p.date || "").trim();
    const fit = (p.fit || "contain").toLowerCase().trim();
    const intervalMs = clampInt(p.interval_ms, 10000, 800, 30000);
    const fadeMs = clampInt(p.fade_ms, 450, 150, 4000);
    const w = clampInt(p.w, 1200, 300, 4000);
    const cacheS = clampInt(p.cache_s, 600, 0, 3600);
    const preloadN = clampInt(p.preload, 2, 0, 6);
    const loadTimeoutMs = clampInt(p.load_timeout_ms, 7000, 1000, 20000);
    const exec = (p.exec || DEFAULT_EXEC).trim();

    const style = document.createElement("style");
    style.textContent = `
      .img { object-fit: ${fit === "cover" ? "cover" : "contain"}; transition: opacity ${fadeMs}ms ease; }
    `;
    document.head.appendChild(style);

    const cbName = "__llPhotoReelCb_" + Math.random().toString(16).slice(2);
    let jsonpScript = null;
    let rotateTimer = null;

    function cleanup() {
      try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
      if (jsonpScript && jsonpScript.parentNode) jsonpScript.parentNode.removeChild(jsonpScript);
    }

    function clearRotateTimer() {
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }
    }

    window[cbName] = function(payload) {
      (async function() {
        try {
          if (!payload || !payload.ok) {
            showEmpty(
              wrap,
              "No photos",
              (dateKey || (payload && payload.dateKey) || "") + " • " + bot,
              (payload && payload.error) || "api error"
            );
            return;
          }

          const photos = Array.isArray(payload.photos) ? payload.photos : [];
          if (!photos.length) {
            showEmpty(wrap, "No photos", payload.dateKey + " • " + payload.bot, "");
            return;
          }

          const slides = photos.map(function(src, i) {
            const im = document.createElement("img");
            im.className = "img";
            im.alt = "photo " + (i + 1);
            im.loading = (i === 0) ? "eager" : "lazy";
            im.decoding = "async";
            try { im.fetchPriority = (i === 0) ? "high" : "low"; } catch (e) {}
            wrap.appendChild(im);
            return {
              raw: String(src || "").trim(),
              candidates: buildCandidateUrls(src, w),
              img: im,
              ready: false,
              failed: false,
              chosenUrl: ""
            };
          });

          const hud = makeHud(payload.dateKey + " • " + payload.bot + " • " + photos.length + " photos • " + VERSION);
          wrap.appendChild(hud);

          async function ensureReady(i) {
            const s = slides[i];
            if (!s) return false;
            if (s.ready) return true;
            if (s.failed) return false;
            try {
              const goodUrl = await tryLoadCandidates(s.candidates, loadTimeoutMs);
              s.chosenUrl = goodUrl;
              s.img.src = goodUrl;
              s.ready = true;
              return true;
            } catch (err) {
              s.failed = true;
              return false;
            }
          }

          async function preloadAround(i) {
            if (preloadN <= 0) return;
            const tasks = [];
            for (let k = 1; k <= preloadN; k++) {
              const j = (i + k) % slides.length;
              const s = slides[j];
              if (s && !s.ready && !s.failed) tasks.push(ensureReady(j));
            }
            try { await Promise.allSettled(tasks); } catch (e) {}
          }

          async function findNextPlayable(fromIdx) {
            for (let step = 1; step <= slides.length; step++) {
              const j = (fromIdx + step) % slides.length;
              const ok = await ensureReady(j);
              if (ok) return j;
            }
            return -1;
          }

          let current = -1;
          const firstIdx = await findNextPlayable(-1);
          if (firstIdx < 0) {
            showEmpty(wrap, "No playable photos", payload.dateKey + " • " + payload.bot, "All image candidates failed to load");
            return;
          }

          current = firstIdx;
          slides[current].img.classList.add("show");
          preloadAround(current);

          async function rotate() {
            clearRotateTimer();
            const nextIdx = await findNextPlayable(current);
            if (nextIdx < 0 || nextIdx === current) {
              rotateTimer = setTimeout(rotate, Math.max(1500, intervalMs));
              return;
            }

            slides[current].img.classList.remove("show");
            slides[nextIdx].img.classList.add("show");
            current = nextIdx;
            preloadAround(current);
            rotateTimer = setTimeout(rotate, Math.max(300, intervalMs));
          }

          rotateTimer = setTimeout(rotate, Math.max(300, intervalMs));
        } finally {
          cleanup();
        }
      })().catch(function(err) {
        showEmpty(wrap, "Photo reel error", dateKey + " • " + bot, err && err.message ? err.message : String(err));
        cleanup();
      });
    };

    if (!exec || !bot || !dateKey) {
      showEmpty(wrap, "Missing params", "Need bot and date", "Example: ?bot=winston&date=2025-12-20");
    } else {
      const apiUrl =
        exec +
        "?r=api_photo_reel" +
        "&bot=" + encodeURIComponent(bot) +
        "&date=" + encodeURIComponent(dateKey) +
        "&w=" + encodeURIComponent(String(w)) +
        "&cache_s=" + encodeURIComponent(String(cacheS)) +
        "&format=jsonp" +
        "&callback=" + encodeURIComponent(cbName);

      jsonpScript = document.createElement("script");
      jsonpScript.src = apiUrl;
      jsonpScript.onerror = function() {
        showEmpty(wrap, "No photos", dateKey + " • " + bot, "Failed to load API JSONP script");
        cleanup();
      };
      document.head.appendChild(jsonpScript);
    }

    window.addEventListener("beforeunload", function() {
      clearRotateTimer();
      cleanup();
    });
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LifeLog Photo Reel v3</title>
  <style>
    html, body { height: 100%; margin: 0; background: transparent; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: transparent;
    }

    .img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: none;
      will-change: opacity;
      pointer-events: none;
      z-index: 1;
    }

    .img.show { opacity: 1; }

    .hud {
      display: none;
    }

    .caption {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 13px;
      line-height: 1.35;
      backdrop-filter: blur(6px);
      box-sizing: border-box;
      pointer-events: none;
      max-height: 34%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      word-break: break-word;
      z-index: 20;
    }

    .dbg {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      max-height: 45%;
      overflow: auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.25;
      color: #fff;
      background: rgba(0,0,0,0.65);
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      display: none;
      white-space: pre-wrap;
      z-index: 30;
    }

    .dbg.on { display: block; }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #fff;
      background: rgba(0,0,0,0.20);
      border-radius: 12px;
      text-align: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .empty .title { font-size: 14px; font-weight: 700; }
    .empty .sub { margin-top: 6px; opacity: 0.85; font-size: 12px; line-height: 1.35; }
    .empty .err { margin-top: 10px; opacity: 0.75; font-size: 11px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap"></div>

  <script>
    const VERSION = "reel_v3_captions";
    const DEFAULT_EXEC = "https://script.google.com/macros/s/AKfycbyHPnSrEOdYJwoIQpRk4SajFg9cgpSeXsH0ilg9-c2EglqzeSIubVhgy7WogI-Idsu8/exec";

    function qs() {
      const out = {};
      const q = (location.search || "").replace(/^\?/, "");
      if (!q) return out;
      q.split("&").forEach(p => {
        const [k, v] = p.split("=");
        const key = decodeURIComponent(k || "").trim();
        if (!key) return;
        out[key] = decodeURIComponent(v || "");
      });
      return out;
    }

    function clampInt(v, def, min, max) {
      const n = Number(v);
      if (!isFinite(n)) return def;
      return Math.max(min, Math.min(max, Math.round(n)));
    }

    function showEmpty(wrap, title, sub, err) {
      wrap.innerHTML = "";
      const d = document.createElement("div");
      d.className = "empty";
      d.innerHTML =
        "<div>" +
          "<div class='title'>" + escapeHtml(title || "") + "</div>" +
          "<div class='sub'>" + escapeHtml(sub || "") + "</div>" +
          (err ? "<div class='err'>" + escapeHtml(err || "") + "</div>" : "") +
        "</div>";
      wrap.appendChild(d);
    }

    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function makeCaption(text) {
      const el = document.createElement("div");
      el.className = "caption";
      el.id = "caption";
      el.textContent = text || "";
      if (!text) el.style.display = "none";
      return el;
    }

    function makeDbg(on) {
      const d = document.createElement("div");
      d.className = "dbg" + (on ? " on" : "");
      d.id = "dbg";
      d.textContent = "";
      return d;
    }

    function dbgSet(lines) {
      const el = document.getElementById("dbg");
      if (!el) return;
      el.textContent = Array.isArray(lines) ? lines.join("\n") : String(lines || "");
    }

    function buildCandidateUrls(src, w) {
      const s = String(src || "").trim();
      if (!s) return [];

      const out = [];
      const seen = new Set();

      function add(u) {
        const x = String(u || "").trim();
        if (!x || seen.has(x)) return;
        seen.add(x);
        out.push(x);
      }

      add(s);

      const id = driveUrlToFileId(s);
      if (id) {
        add("https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w" + encodeURIComponent(String(w)));
        add("https://lh3.googleusercontent.com/d/" + encodeURIComponent(id) + "=w" + encodeURIComponent(String(w)));
        add("https://drive.google.com/uc?export=view&id=" + encodeURIComponent(id));
        add("https://drive.google.com/uc?export=download&id=" + encodeURIComponent(id));
      }

      return out;
    }

    function driveUrlToFileId(url) {
      const s = String(url || "").trim();
      if (!s) return "";

      let m = /\/file\/d\/([a-zA-Z0-9_-]+)/.exec(s);
      if (!m) m = /[?&]id=([a-zA-Z0-9_-]+)/.exec(s);
      return m ? m[1] : "";
    }

    function tryLoadCandidates(candidates, timeout) {
      return new Promise((resolve, reject) => {
        let idx = 0;
        let settled = false;
        let timer = null;
        let probe = null;

        function cleanup() {
          if (timer) clearTimeout(timer);
          timer = null;
          if (probe) {
            probe.onload = null;
            probe.onerror = null;
            probe = null;
          }
        }

        function tryNext() {
          if (settled) return;
          if (idx >= candidates.length) {
            settled = true;
            cleanup();
            reject(new Error("All candidates failed"));
            return;
          }

          const url = String(candidates[idx++] || "").trim();
          if (!url) {
            tryNext();
            return;
          }

          probe = new Image();
          let completed = false;

          probe.onload = function() {
            if (completed || settled) return;
            completed = true;
            settled = true;
            cleanup();
            resolve(url);
          };

          probe.onerror = function() {
            if (completed || settled) return;
            completed = true;
            cleanup();
            tryNext();
          };

          timer = setTimeout(function() {
            if (completed || settled) return;
            completed = true;
            cleanup();
            tryNext();
          }, timeout);

          probe.decoding = "async";
          probe.referrerPolicy = "no-referrer";
          probe.src = url;
        }

        tryNext();
      });
    }

    const wrap = document.getElementById("wrap");
    const p = qs();

    const bot = (p.bot || "winston").trim();
    const dateKey = (p.date || "").trim();
    const fit = (p.fit || "contain").toLowerCase().trim();
    const intervalMs = clampInt(p.interval_ms, 10000, 800, 30000);
    const fadeMs = clampInt(p.fade_ms, 450, 150, 4000);
    const w = clampInt(p.w, 1200, 300, 4000);
    const cacheS = clampInt(p.cache_s, 600, 0, 3600);
    const preloadN = clampInt(p.preload, 2, 0, 6);
    const loadTimeoutMs = clampInt(p.load_timeout_ms, 7000, 1000, 20000);
    const debugOn = String(p.debug || "").trim() === "1";
    const exec = (p.exec || DEFAULT_EXEC).trim();

    const style = document.createElement("style");
    style.textContent = `
      .img {
        object-fit: ${fit === "cover" ? "cover" : "contain"};
        transition: opacity ${fadeMs}ms ease;
      }
    `;
    document.head.appendChild(style);

    const cbName = "__llPhotoReelCb_" + Math.random().toString(16).slice(2);
    let jsonpScript = null;
    let rotateTimer = null;

    function cleanup() {
      try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
      if (jsonpScript && jsonpScript.parentNode) jsonpScript.parentNode.removeChild(jsonpScript);
    }

    function clearRotateTimer() {
      if (rotateTimer) {
        clearTimeout(rotateTimer);
        rotateTimer = null;
      }
    }

    function updateCaption(index, slides) {
      const el = document.getElementById("caption");
      if (!el) return;

      const text = slides[index] && slides[index].caption ? String(slides[index].caption) : "";
      el.textContent = text;
      el.style.display = text ? "block" : "none";

      if (debugOn) {
        const cs = window.getComputedStyle(el);
        dbgSet([
          "version: " + VERSION,
          "index: " + index,
          "slides: " + slides.length,
          "caption exists: " + (!!el),
          "caption display: " + cs.display,
          "caption visibility: " + cs.visibility,
          "caption opacity: " + cs.opacity,
          "caption z-index: " + cs.zIndex,
          "caption length: " + text.length,
          "caption text: " + (text || "[empty]")
        ]);
      }
    }

    window[cbName] = function(payload) {
      (async function() {
        try {
          if (!payload || !payload.ok) {
            showEmpty(
              wrap,
              "No photos",
              (dateKey || (payload && payload.dateKey) || "") + " • " + bot,
              (payload && payload.error) || "api error"
            );
            return;
          }

          const items = Array.isArray(payload.items) && payload.items.length
            ? payload.items.map(function(it) {
                return {
                  src: String((it && (it.thumb || it.original || "")) || "").trim(),
                  caption: String((it && it.caption) || "").trim()
                };
              }).filter(function(it) { return !!it.src; })
            : (Array.isArray(payload.photos) ? payload.photos.map(function(src, i) {
                const captions = Array.isArray(payload.captions) ? payload.captions : [];
                return {
                  src: String(src || "").trim(),
                  caption: String(captions[i] || "").trim()
                };
              }).filter(function(it) { return !!it.src; }) : []);

          if (!items.length) {
            showEmpty(wrap, "No photos", payload.dateKey + " • " + payload.bot, "");
            return;
          }

          wrap.innerHTML = "";

          const slides = items.map(function(item, i) {
            const im = document.createElement("img");
            im.className = "img";
            im.alt = "photo " + (i + 1);
            im.loading = (i === 0) ? "eager" : "lazy";
            im.decoding = "async";
            try { im.fetchPriority = (i === 0) ? "high" : "low"; } catch (e) {}
            wrap.appendChild(im);
            return {
              raw: item.src,
              caption: item.caption,
              candidates: buildCandidateUrls(item.src, w),
              img: im,
              ready: false,
              failed: false,
              chosenUrl: ""
            };
          });

          const captionEl = makeCaption(slides[0] && slides[0].caption ? slides[0].caption : "");
          wrap.appendChild(captionEl);

          const dbg = makeDbg(debugOn);
          wrap.appendChild(dbg);

          async function ensureReady(i) {
            const s = slides[i];
            if (!s) return false;
            if (s.ready) return true;
            if (s.failed) return false;
            try {
              const goodUrl = await tryLoadCandidates(s.candidates, loadTimeoutMs);
              s.chosenUrl = goodUrl;
              s.img.src = goodUrl;
              s.ready = true;
              return true;
            } catch (err) {
              s.failed = true;
              return false;
            }
          }

          async function preloadAround(i) {
            if (preloadN <= 0) return;
            const tasks = [];
            for (let k = 1; k <= preloadN; k++) {
              const j = (i + k) % slides.length;
              const s = slides[j];
              if (s && !s.ready && !s.failed) tasks.push(ensureReady(j));
            }
            try { await Promise.allSettled(tasks); } catch (e) {}
          }

          async function findNextPlayable(fromIdx) {
            for (let step = 1; step <= slides.length; step++) {
              const j = (fromIdx + step) % slides.length;
              const ok = await ensureReady(j);
              if (ok) return j;
            }
            return -1;
          }

          let current = -1;
          const firstIdx = await findNextPlayable(-1);
          if (firstIdx < 0) {
            showEmpty(wrap, "No playable photos", payload.dateKey + " • " + payload.bot, "All image candidates failed to load");
            return;
          }

          current = firstIdx;
          slides[current].img.classList.add("show");
          updateCaption(current, slides);
          preloadAround(current);

          async function rotate() {
            clearRotateTimer();
            const nextIdx = await findNextPlayable(current);
            if (nextIdx < 0 || nextIdx === current) {
              rotateTimer = setTimeout(rotate, Math.max(1500, intervalMs));
              return;
            }

            slides[current].img.classList.remove("show");
            slides[nextIdx].img.classList.add("show");
            current = nextIdx;
            updateCaption(current, slides);
            preloadAround(current);
            rotateTimer = setTimeout(rotate, Math.max(300, intervalMs));
          }

          rotateTimer = setTimeout(rotate, Math.max(300, intervalMs));
        } finally {
          cleanup();
        }
      })().catch(function(err) {
        showEmpty(wrap, "Photo reel error", dateKey + " • " + bot, err && err.message ? err.message : String(err));
        cleanup();
      });
    };

    if (!exec || !bot || !dateKey) {
      showEmpty(wrap, "Missing params", "Need bot and date", "Example: ?bot=winston&date=2025-12-20");
    } else {
      const apiUrl =
        exec +
        "?r=api_photo_reel" +
        "&bot=" + encodeURIComponent(bot) +
        "&date=" + encodeURIComponent(dateKey) +
        "&w=" + encodeURIComponent(String(w)) +
        "&cache_s=" + encodeURIComponent(String(cacheS)) +
        "&format=jsonp" +
        "&callback=" + encodeURIComponent(cbName);

      jsonpScript = document.createElement("script");
      jsonpScript.src = apiUrl;
      jsonpScript.onerror = function() {
        showEmpty(wrap, "No photos", dateKey + " • " + bot, "Failed to load API JSONP script");
        cleanup();
      };
      document.head.appendChild(jsonpScript);
    }

    window.addEventListener("beforeunload", function() {
      clearRotateTimer();
      cleanup();
    });
  </script>
</body>
</html>
